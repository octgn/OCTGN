name: Electron CI

on:
  push:
    branches: [feat/elec]
    paths:
      - 'octgnFX/Octgn.Electron/**'
      - '.github/workflows/electron-ci.yml'
  pull_request:
    branches: [feat/elec]
    paths:
      - 'octgnFX/Octgn.Electron/**'
      - '.github/workflows/electron-ci.yml'

defaults:
  run:
    working-directory: octgnFX/Octgn.Electron

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: octgnFX/Octgn.Electron/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('octgnFX/Octgn.Electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck renderer (tsconfig.json)
        run: npx tsc --noEmit

      - name: Typecheck main (tsconfig.main.json)
        run: npx tsc -p tsconfig.main.json --noEmit

      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: octgnFX/Octgn.Electron/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('octgnFX/Octgn.Electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: octgnFX/Octgn.Electron/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: octgnFX/Octgn.Electron/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('octgnFX/Octgn.Electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build main process
        run: npm run build:main

      - name: Build renderer
        run: npm run build:renderer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: octgnFX/Octgn.Electron/dist/
          retention-days: 7

  package:
    name: Package (Linux)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/elec'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: octgnFX/Octgn.Electron/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('octgnFX/Octgn.Electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Package for Linux
        run: npm run package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux-package
          path: |
            octgnFX/Octgn.Electron/release/*.AppImage
            octgnFX/Octgn.Electron/release/*.deb
          retention-days: 30
