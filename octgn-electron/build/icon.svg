<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <!-- Card shape -->
  <rect x="120" y="80" width="160" height="220" rx="16" fill="white" stroke="url(#accent)" stroke-width="4"/>
  <rect x="140" y="100" width="120" height="60" fill="#e5e7eb"/>
  <rect x="140" y="180" width="120" height="100" fill="#f3f4f6"/>
  
  <!-- Second card (behind) -->
  <rect x="232" y="140" width="160" height="220" rx="16" fill="white" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  <rect x="252" y="160" width="120" height="60" fill="#e5e7eb"/>
  <rect x="252" y="240" width="120" height="100" fill="#f3f4f6"/>
  
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="48" font-weight="bold">OCTGN</text>
  <text x="256" y="475" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="20">Electron</text>
</svg>
